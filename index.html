<div class="sidebar m-3 p-4"
style="background-color: #FFC0CB; height: auto; width: 22%; position: fixed; top:120px; right: 0; z-index: 1;">

    <!-- Category -->
    <select class="form-select mt-2" id="category" onchange="loadBrands()">
        <option value="">All Categories</option>
        <option value="beauty">Beauty</option>
        <option value="footwear">Footwear</option>
        <option value="Clothes">Clothes</option>
        <option value="Accessories"Accessories</option>
    </select>

    <!-- Brand -->
    <select class="form-select mt-2" id="brand" onchange="loadTypes()">
        <option value="">Select Brand</option>
    </select>

    <!-- Type -->
    <select class="form-select mt-2" id="type">
        <option value="">Select Type</option>
    </select>

    <!-- Buttons -->
    <button onclick="applyFilters()" class="btn btn-danger mt-3 w-100">Search</button>
    <button onclick="showAllProducts()" class="btn btn-dark mt-2 w-100">All Products</button>

</div>
